<style>

  a{display:inline-block;font-weight:600;padding:14px 30px;border-radius:999px;text-decoration:none;
    background:#e8a13a;color:#3a2410;box-shadow:0 8px 26px rgba(232,161,58,.4);transition:transform .2s;}
  a:hover{transform:translateY(-3px);}
</style>
